# Default deploy: dashboard owns the dryrun loop (spawns it as a child).
# For LIVE trading, stop the dashboard service and run the cli with `live` instead.
# Never run two writers on the same SQLite file.

services:
  dashboard:
    build: .
    image: trade:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - trade-data:/app/data
      - trade-logs:/app/logs
    command:
      - node
      - node_modules/ts-node/dist/bin.js
      - src/dashboard/server.ts

volumes:
  trade-data:
  trade-logs:
